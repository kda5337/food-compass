name: KAMIS Daily Fetch

# [2026-07-15 (11) 수정] KAMIS가 GitHub Actions 러너 IP를 계속 차단하는 것을 실측으로
# 확인함(같은 날 같은 러너에서 참가격 API는 98.9% 성공했는데 KAMIS만 매번 6/6 전체
# 실패 — GCE VM(food-compass, Seoul)에서는 6/6 전부 정상 성공하는 것도 직접 확인).
# 매일 스케줄 실행 책임을 GCE VM의 crontab(appuser, `0 0 * * *` UTC)으로 옮기고, 여기서는
# schedule 트리거를 제거 — 이 워크플로우가 매일 자동으로 실패만 반복하는 걸 막기 위함.
# workflow_dispatch는 그대로 남겨서 필요할 때 수동으로 GitHub Actions에서도 재현/디버깅
# 가능하게 함(예: VM 자체 문제인지 KAMIS 문제인지 다시 구분해야 할 때).
on:
  workflow_dispatch: {}

env:
  UV_PYTHON: "3.12"

jobs:
  fetch:
    name: Fetch KAMIS snapshot → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen --no-dev
      - name: Run fetch script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KAMIS_CERT_KEY: ${{ secrets.KAMIS_CERT_KEY }}
          KAMIS_CERT_ID: ${{ secrets.KAMIS_CERT_ID }}
        run: .venv/bin/python scripts/fetch_kamis_snapshot.py
