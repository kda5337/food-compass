# Food Compass CD 워크플로우 (GHCR + Compute Engine 배포)
#
# CI(ci.yml, name: "CI")가 main 브랜치에서 "성공"한 뒤에만 실행됩니다.
# → lint/test가 깨진 코드는 배포되지 않음 (CI를 CD의 전제 조건으로 삼음)
# GitHub Actions에서 api/frontend 두 이미지를 빌드해 GHCR에 Push하고,
# Compute Engine(food-compass VM)에서는 Pull만 해서 배포합니다 — VM은 e2-medium(2vCPU/4GB)이라
# torch/sentence-transformers를 매번 빌드하면 느리고 디스크도 부족해지는 문제가 있었음
# (dev_notes 2026-07-14 (7) 참고) — 빌드를 CI 러너로 옮겨서 이 문제를 원천적으로 피함.
#
# 필요한 GitHub Secrets:
#   - GCE_HOST: Compute Engine 외부 IP
#   - GCE_USERNAME: appuser
#   - GCE_SSH_KEY: CD 전용 SSH 개인키
#   - DATABASE_URL / SUPABASE_URL / SUPABASE_KEY / UPSTAGE_API_KEY / KAMIS_CERT_KEY / KAMIS_CERT_ID
#     (test job에서 이미 사용 중인 것과 동일한 secrets 재사용)
#   - PRICE_GOKR_SERVICE_KEY / LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY / LANGFUSE_HOST
#     (아직 미사용 기능용 — 값이 없으면 빈 문자열로 채워짐, 안전)

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      rollback:
        description: "이전 버전으로 롤백"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # =========================================================
  # Job 1: api/frontend 이미지 빌드 & GHCR Push
  # =========================================================
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && !inputs.rollback) }}
    strategy:
      matrix:
        service: [api, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR은 소문자만 허용
      - name: Lowercase repository
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # =========================================================
  # Job 2: Compute Engine 배포 (Pull & Run)
  # =========================================================
  deploy:
    name: Deploy to Compute Engine
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ always() && (needs.build-and-push.result == 'success' || inputs.rollback) }}

    steps:
      - name: Deploy (normal)
        if: ${{ !inputs.rollback }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USERNAME }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -e

            echo "배포 시작: ${{ github.sha }}"
            cd /home/${{ secrets.GCE_USERNAME }}/food-compass
            git pull origin main

            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
            export API_IMAGE="ghcr.io/${REPO_LOWER}/api:${IMAGE_TAG}"
            export FRONTEND_IMAGE="ghcr.io/${REPO_LOWER}/frontend:${IMAGE_TAG}"

            # .env 재생성 (GitHub Secrets 기준 — 값이 바뀌어도 수동 SSH 없이 항상 최신 유지)
            cat > .env << 'ENV_EOF'
            KAMIS_CERT_KEY=${{ secrets.KAMIS_CERT_KEY }}
            KAMIS_CERT_ID=${{ secrets.KAMIS_CERT_ID }}
            PRICE_GOKR_SERVICE_KEY=${{ secrets.PRICE_GOKR_SERVICE_KEY }}
            UPSTAGE_API_KEY=${{ secrets.UPSTAGE_API_KEY }}
            LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }}
            LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }}
            LANGFUSE_HOST=${{ secrets.LANGFUSE_HOST }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ENV_EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 롤백용으로 현재 배포된 이미지 태그를 보관
            [ -f .current_api_image ] && cp .current_api_image .previous_api_image
            [ -f .current_frontend_image ] && cp .current_frontend_image .previous_frontend_image
            echo "$API_IMAGE" > .current_api_image
            echo "$FRONTEND_IMAGE" > .current_frontend_image

            # [2026-07-14 추가] 순차 pull은 첫 배포 때 병목이었음(레이어 캐시 없는 상태에서
            # api 이미지가 무거워 4분대 배포의 대부분을 차지) — 두 이미지를 병렬로 pull.
            # 인자 없는 `wait`는 백그라운드 job이 실패해도 항상 0을 반환해 `set -e`가 못 잡으므로
            # PID를 각각 잡아서 개별적으로 기다림
            docker pull "$API_IMAGE" & API_PULL_PID=$!
            docker pull "$FRONTEND_IMAGE" & FRONTEND_PULL_PID=$!
            wait "$API_PULL_PID"
            wait "$FRONTEND_PULL_PID"
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "헬스체크 중..."
            MAX_RETRIES=12
            for i in $(seq 1 $MAX_RETRIES); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "배포 성공 (HTTP $STATUS)"
                docker image prune -af
                exit 0
              fi
              echo "  시도 $i/$MAX_RETRIES (HTTP $STATUS)..."
              if [ "$i" = "$MAX_RETRIES" ]; then
                echo "헬스체크 실패 — 자동 롤백 시도"
                docker compose -f docker-compose.prod.yml logs --tail=100
                if [ -f .previous_api_image ] && [ -f .previous_frontend_image ]; then
                  export API_IMAGE=$(cat .previous_api_image)
                  export FRONTEND_IMAGE=$(cat .previous_frontend_image)
                  docker pull "$API_IMAGE"
                  docker pull "$FRONTEND_IMAGE"
                  docker compose -f docker-compose.prod.yml up -d --force-recreate
                  echo "이전 버전으로 롤백됨"
                fi
                exit 1
              fi
              sleep 5
            done

      - name: Rollback to previous version
        if: ${{ inputs.rollback }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USERNAME }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.GCE_USERNAME }}/food-compass

            if [ ! -f .previous_api_image ] || [ ! -f .previous_frontend_image ]; then
              echo "이전 버전 정보가 없습니다"
              exit 1
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export API_IMAGE=$(cat .previous_api_image)
            export FRONTEND_IMAGE=$(cat .previous_frontend_image)
            # [2026-07-14 추가] 순차 pull은 첫 배포 때 병목이었음(레이어 캐시 없는 상태에서
            # api 이미지가 무거워 4분대 배포의 대부분을 차지) — 두 이미지를 병렬로 pull.
            # 인자 없는 `wait`는 백그라운드 job이 실패해도 항상 0을 반환해 `set -e`가 못 잡으므로
            # PID를 각각 잡아서 개별적으로 기다림
            docker pull "$API_IMAGE" & API_PULL_PID=$!
            docker pull "$FRONTEND_IMAGE" & FRONTEND_PULL_PID=$!
            wait "$API_PULL_PID"
            wait "$FRONTEND_PULL_PID"
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            MAX_RETRIES=12
            for i in $(seq 1 $MAX_RETRIES); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "롤백 성공"
                echo "$API_IMAGE" > .current_api_image
                echo "$FRONTEND_IMAGE" > .current_frontend_image
                exit 0
              fi
              sleep 5
            done
            echo "롤백 실패"
            docker compose -f docker-compose.prod.yml logs --tail=50
            exit 1
